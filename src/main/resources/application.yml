spring:
  application:
    name: bridge-agent

  datasource:
    url: jdbc:mysql://localhost:3306/bridge_mgmt?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:bridge}
    password: ${DB_PASS:bridge123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:${OPENAI_API_KEY:}}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}
          temperature: 0.1
          max-tokens: 2048
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        collection-name: ${QDRANT_COLLECTION:bridge_standards}
        initialize-schema: true

  cache:
    type: redis
    redis:
      time-to-live: 86400000

bridge:
  models:
    qwen:
      base-url: ${QWEN_LOCAL_BASE_URL:http://localhost:8001/v1}
      api-key: ${QWEN_LOCAL_API_KEY:}
      model: ${QWEN_LOCAL_MODEL:qwen2.5-7b-instruct}
      temperature: 0.1
      max-tokens: 1024
    bge:
      embedding:
        base-url: ${BGE_EMBEDDING_BASE_URL:http://localhost:8002/v1}
        api-key: ${BGE_EMBEDDING_API_KEY:}
        model: ${BGE_EMBEDDING_MODEL:bge-m3}
        dimensions: ${BGE_EMBEDDING_DIMENSIONS:1024}
      reranker:
        base-url: ${BGE_RERANKER_BASE_URL:http://localhost:8003/v1}
        api-key: ${BGE_RERANKER_API_KEY:}
        model: ${BGE_RERANKER_MODEL:bge-reranker-v2-m3}

  agent:
    react:
      max-iterations: 8
      max-consecutive-errors: 2
    context:
      full-window-size: 20
      summary-threshold: 30
    session:
      ttl-hours: 8
    rag:
      sparse-top-k: 20
      dense-top-k: 20
      rerank-top-n: 5
      final-top-k: 3

  search-v3:
    markdown-root: ${BRIDGE_MARKDOWN_ROOT:src/main/resources/standards-md}
    sparse-top-k: 8
    dense-top-k: 8
    fusion-top-k: 8
    rerank-top-n: 6
    final-top-k: 4
    rrf-k: 60

logging:
  level:
    com.bridge.agent: DEBUG
    org.springframework.ai: INFO
